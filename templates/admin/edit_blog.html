{% extends "base.html" %}

{% block title %}Edit Blog - Admin - Cognisutra{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <h1 class="font-display text-4xl mb-8">Edit Blog: {{ blog.title }}</h1>
    
    <form method="POST" class="bg-white rounded-lg border border-slate-200 p-8 space-y-6">
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Title *</label>
            <input type="text" name="title" required value="{{ blog.title }}" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-primary">
        </div>
        
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Slug *</label>
            <input type="text" name="slug" required value="{{ blog.slug }}" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-primary">
        </div>
        
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Excerpt (Brief summary)</label>
            <textarea name="excerpt" rows="2" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-primary">{{ blog.excerpt or '' }}</textarea>
        </div>
        
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Content (HTML/Markdown) *</label>
            <textarea name="content" required rows="10" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-primary font-mono">{{ blog.content }}</textarea>
        </div>
        
        <div class="grid md:grid-cols-3 gap-6">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Category</label>
                <input type="text" name="category" value="{{ blog.category or '' }}" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-primary">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Author</label>
                <input type="text" name="author" value="{{ blog.author or 'Cognisutra Team' }}" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-primary">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Featured Image URL</label>
                <input type="url" name="featured_image" value="{{ blog.featured_image or '' }}" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-primary">
            </div>
        </div>
        
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Tags (JSON array)</label>
            <textarea name="tags" rows="2" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-primary font-mono">{{ blog.tags|tojson if blog.tags else '[]' }}</textarea>
        </div>
        
        <div class="flex items-center gap-2">
            <input type="checkbox" id="published" name="is_published" {% if blog.is_published %}checked{% endif %}>
            <label for="published" class="text-sm text-slate-700">Published</label>
        </div>
        
        <div class="flex gap-4 pt-4">
            <button type="submit" class="bg-primary text-white px-6 py-2 rounded-lg font-semibold hover:bg-red-700 transition">
                Update Blog
            </button>
            <a href="{{ url_for('admin.blogs') }}" class="border-2 border-slate-300 text-slate-700 px-6 py-2 rounded-lg font-semibold hover:bg-slate-100 transition">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
