{% extends "base.html" %}

{% block title %}Create Blog - Admin - Cognisutra{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <h1 class="font-display text-4xl mb-8">Create New Blog Post</h1>
    
    <form method="POST" class="bg-white rounded-lg border border-slate-200 p-8 space-y-6">
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Title *</label>
            <input type="text" name="title" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-primary">
        </div>
        
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Slug *</label>
            <input type="text" name="slug" required placeholder="blog-post-title" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-primary">
        </div>
        
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Excerpt (Brief summary)</label>
            <textarea name="excerpt" rows="2" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-primary"></textarea>
        </div>
        
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Content (HTML/Markdown) *</label>
            <textarea name="content" required rows="10" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-primary font-mono"></textarea>
        </div>
        
        <div class="grid md:grid-cols-3 gap-6">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Category</label>
                <input type="text" name="category" placeholder="tutorials" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-primary">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Author</label>
                <input type="text" name="author" value="Cognisutra Team" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-primary">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Featured Image URL</label>
                <input type="url" name="featured_image" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-primary">
            </div>
        </div>
        
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Tags (JSON array)</label>
            <textarea name="tags" rows="2" placeholder='["tag1", "tag2"]' class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-primary font-mono"></textarea>
        </div>
        
        <div class="flex items-center gap-2">
            <input type="checkbox" id="published" name="is_published">
            <label for="published" class="text-sm text-slate-700">Publish immediately</label>
        </div>
        
        <div class="flex gap-4 pt-4">
            <button type="submit" class="bg-primary text-white px-6 py-2 rounded-lg font-semibold hover:bg-red-700 transition">
                Create Blog
            </button>
            <a href="{{ url_for('admin.blogs') }}" class="border-2 border-slate-300 text-slate-700 px-6 py-2 rounded-lg font-semibold hover:bg-slate-100 transition">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
