{% extends "base.html" %}

{% block title %}Create Tool - Admin - Cognisutra{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <h1 class="font-display text-4xl mb-8">Create New Tool</h1>
    
    <form method="POST" class="bg-white rounded-lg border border-slate-200 p-8 space-y-6">
        <div class="grid md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Tool Name *</label>
                <input type="text" name="name" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-primary">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Slug *</label>
                <input type="text" name="slug" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-primary" placeholder="tool-name">
            </div>
        </div>
        
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Description *</label>
            <textarea name="description" required rows="3" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-primary"></textarea>
        </div>
        
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Long Description</label>
            <textarea name="long_description" rows="5" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-primary"></textarea>
        </div>
        
        <div class="grid md:grid-cols-3 gap-6">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Category *</label>
                <select name="category" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-primary">
                    <option value="">Select Category</option>
                    <option value="productivity">Productivity</option>
                    <option value="content-creation">Content Creation</option>
                    <option value="business">Business & Finance</option>
                    <option value="marketing">Marketing & Analytics</option>
                    <option value="sales">Sales & CRM</option>
                    <option value="education">Education</option>
                    <option value="health">Health & Wellness</option>
                    <option value="development">Development</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Price *</label>
                <input type="text" name="price" required placeholder="₹299/mo" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-primary">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Revenue Model</label>
                <input type="text" name="revenue_model" placeholder="Freemium" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-primary">
            </div>
        </div>
        
        <div class="grid md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Effort (Build Time)</label>
                <input type="text" name="effort" placeholder="1-2 weeks" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-primary">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Target Audience</label>
                <input type="text" name="audience" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-primary">
            </div>
        </div>
        
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Pain Point</label>
            <textarea name="pain_point" rows="3" placeholder="What problem does this solve?" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-primary"></textarea>
        </div>
        
        <div class="grid md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Demo URL</label>
                <input type="url" name="demo_url" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-primary">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">GitHub URL</label>
                <input type="url" name="github_url" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-primary">
            </div>
        </div>
        
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Features (JSON array)</label>
            <textarea name="features" rows="3" placeholder='["Feature 1", "Feature 2"]' class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-primary font-mono"></textarea>
        </div>
        
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Tech Stack (JSON array)</label>
            <textarea name="tech_stack" rows="3" placeholder='["Flask", "Tailwind"]' class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-primary font-mono"></textarea>
        </div>
        
        <div class="flex items-center gap-2">
            <input type="checkbox" id="published" name="is_published" checked>
            <label for="published" class="text-sm text-slate-700">Publish immediately</label>
        </div>
        
        <div class="flex gap-4 pt-4">
            <button type="submit" class="bg-primary text-white px-6 py-2 rounded-lg font-semibold hover:bg-red-700 transition">
                Create Tool
            </button>
            <a href="{{ url_for('admin.tools') }}" class="border-2 border-slate-300 text-slate-700 px-6 py-2 rounded-lg font-semibold hover:bg-slate-100 transition">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
