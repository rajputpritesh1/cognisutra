{% extends "base.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center">
    <div class="text-center">
        <h1 class="font-display text-9xl text-slate-300 mb-4">404</h1>
        <h2 class="font-display text-4xl mb-4">Page Not Found</h2>
        <p class="text-slate-600 text-lg mb-8">Sorry, the page you're looking for doesn't exist.</p>
        <a href="{{ url_for('main.index') }}" class="bg-primary text-white px-8 py-3 rounded-lg font-semibold hover:bg-red-700 transition inline-block">
            Back to Home
        </a>
    </div>
</div>
{% endblock %}
